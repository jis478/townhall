<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>タウンホールクリニック — フライヤー A6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:      #1f6b6b;
      --teal-soft: #d9e9e6;
      --teal-dark: #0e3a3a;
      --ink:       #0f1d2c;
      --ink-mute:  #6b7a8c;
      --line:      #e8e2d6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b0b8c1;
      font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 16px;
    }

    /* A6 at 96 dpi ≈ 397 × 561 px */
    .card {
      width: 397px;
      min-height: 561px;
      background: #ffffff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 10px 60px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
    }

    /* ── Top accent bar ── */
    .bar-top {
      height: 8px;
      background: linear-gradient(90deg, var(--teal-dark) 0%, var(--teal) 60%, #3aa0a0 100%);
      flex-shrink: 0;
    }

    /* ── Logo row ── */
    .logo-row {
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .logo-img {
      height: 52px;
      width: auto;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-en {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .logo-jp {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .logo-service {
      font-size: 12px;
      font-weight: 500;
      color: var(--teal);
      margin-top: 2px;
    }

    /* ── Main message ── */
    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 28px 12px;
      text-align: center;
      gap: 8px;
    }

    .tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--teal);
      background: var(--teal-soft);
      padding: 4px 12px;
      border-radius: 999px;
    }

    .headline {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.2;
      color: var(--ink);
      letter-spacing: -0.03em;
    }

    .headline em {
      font-style: normal;
      color: var(--teal);
    }

    .subtext {
      font-size: 12px;
      color: var(--ink-mute);
      font-weight: 500;
      line-height: 1.6;
    }

    /* ── QR block ── */
    .qr-block {
      margin: 0 20px 20px;
      background: var(--ink);
      border-radius: 12px;
      padding: 16px 18px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .qr-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.06em;
      text-align: center;
    }

    .qr-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-frame {
      background: #fff;
      border-radius: 10px;
      padding: 8px;
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-frame img {
      display: block;
      width: 134px;
      height: 134px;
    }

    .qr-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.5;
    }

    .qr-label span {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
    }

    @media print {
      body { background: none; padding: 0; min-height: unset; }
      .hint { display: none; }
      .card { box-shadow: none; }
      @page { size: A6 portrait; margin: 0; }
    }
  </style>
</head>
